name: Deploy Infrastructure with Terraform and Ansible

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2
      
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.TERRAFORM_SSH_PRIVATE_KEY }}" > ~/.ssh/ansible-terraform.pem
          chmod 600 ~/.ssh/ansible-terraform.pem
          ssh-keyscan -H github.com >> ~/.ssh/known_hosts 2>/dev/null || true
      
      - name: Initialize Terraform
        working-directory: ./terraform
        run: terraform init
      
      - name: Validate Terraform
        working-directory: ./terraform
        run: terraform validate
      
      - name: Plan Terraform
        working-directory: ./terraform
        run: terraform plan -out=tfplan
      
      - name: Run orchestration script
        run: python3 orchestrate.py
      
      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: orchestration-logs
          path: orchestration.log
      
      - name: Print final status
        if: success()
        run: echo "✓ Infrastructure deployed successfully!"
      
      - name: Print failure status
        if: failure()
        run: echo "✗ Deployment failed. Check logs above."
